name: Instagram Auto Post

on:
  schedule:
    # 9:00 JST (UTC 0:00)
    - cron: "0 0 * * *"
    # 19:00 JST (UTC 10:00)
    - cron: "0 10 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（投稿しない）'
        required: false
        default: 'false'
        type: boolean

jobs:
  # ジョブ1: キャプション生成 + 画像生成 + コミット
  generate_and_commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      image_filename: ${{ steps.generate.outputs.image_filename }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate caption and image
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python src/main.py --platform instagram --generate

          LATEST=$(ls -t posts/media/*.png 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            FILENAME=$(basename "$LATEST")
            echo "image_filename=${FILENAME}" >> $GITHUB_OUTPUT
            echo "生成画像: ${FILENAME}"
          else
            echo "image_filename=" >> $GITHUB_OUTPUT
            echo "警告: 画像ファイルが見つかりませんでした"
            exit 1
          fi

      - name: Commit generated image
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -f posts/media/*.png posts/queue.json
          git diff --staged --quiet || git commit -m "chore: Instagram画像生成 [skip ci]"
          git push || true

  # ジョブ2: Instagram に投稿（画像がコミットされた後に実行）
  post_to_instagram:
    needs: generate_and_commit
    if: ${{ inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh and post to Instagram
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          FACEBOOK_APP_ID: ${{ secrets.FACEBOOK_APP_ID }}
          FACEBOOK_APP_SECRET: ${{ secrets.FACEBOOK_APP_SECRET }}
          STORED_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$FACEBOOK_APP_ID" ] && [ -n "$FACEBOOK_APP_SECRET" ] && [ -n "$STORED_TOKEN" ]; then
            RESPONSE=$(curl -sf "https://graph.facebook.com/oauth/access_token?grant_type=fb_exchange_token&client_id=${FACEBOOK_APP_ID}&client_secret=${FACEBOOK_APP_SECRET}&fb_exchange_token=${STORED_TOKEN}" 2>/dev/null || echo "")
            NEW_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token',''))" 2>/dev/null || echo "")
            if [ -n "$NEW_TOKEN" ]; then
              export INSTAGRAM_ACCESS_TOKEN="$NEW_TOKEN"
              echo "トークン更新成功（60日間有効）"
            else
              export INSTAGRAM_ACCESS_TOKEN="$STORED_TOKEN"
              echo "トークン更新失敗。保存済みトークンを使用: $RESPONSE"
            fi
          else
            export INSTAGRAM_ACCESS_TOKEN="$STORED_TOKEN"
            echo "APP_ID/APP_SECRET未設定。保存済みトークンをそのまま使用します。"
          fi
          echo "=== 権限チェック ==="
          curl -s "https://graph.facebook.com/me/permissions?access_token=${INSTAGRAM_ACCESS_TOKEN}" | python3 -m json.tool 2>/dev/null || echo "権限取得失敗"
          echo "=== Facebookページ確認 ==="
          curl -s "https://graph.facebook.com/me/accounts?fields=id,name,instagram_business_account&access_token=${INSTAGRAM_ACCESS_TOKEN}" | python3 -m json.tool 2>/dev/null || echo "ページ取得失敗"
          echo "=== 投稿実行 ==="
          python src/main.py --platform instagram

      - name: Commit Instagram history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add posts/instagram_history.json posts/queue.json || true
          git diff --staged --quiet || git commit -m "chore: Instagram投稿履歴更新 [skip ci]"
          git push || true
